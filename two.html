<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Health Assistant</title>
  <style>
    body {  
      font-family: 'Segoe UI', sans-serif;  
      margin: 0;  
      padding: 0;  
      /* Background hospital image */
      background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80') no-repeat center center fixed;  
      background-size: cover;  
      color: #333;  
    }

    /* Overlay to make text readable */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 122, 204, 0.6); /* semi-transparent blue overlay */
      z-index: -1;
    }

    header {
      background: linear-gradient(90deg, rgba(0,68,102,0.9), rgba(0,122,204,0.9));
      color: white;
      padding: 30px;
      text-align: center;
      border-bottom: 5px solid #00c6ff;
      animation: fadeInDown 1.5s ease;
    }

    header h1 { margin: 0; font-size: 2.5em; }
    header p { margin: 5px 0 0; font-size: 1.2em; }

    main {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    section {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: fadeInUp 1.2s ease;
    }

    h2 {
      margin-top: 0;
      color: #004466;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
      font-size: 1em;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 12px 24px;
      background: linear-gradient(90deg,#007acc,#00c6ff);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #aiResponse {
      margin-top: 15px;
      background-color: #e0f7fa;
      padding: 15px;
      border-left: 5px solid #007acc;
      border-radius: 8px;
      font-size: 1em;
      white-space: pre-line;
    }

    .doctor-image {
      margin-top: 15px;
      text-align: center;
    }
    .doctor-image img {
      max-width: 200px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .loader {
      display: none;
      margin-top: 15px;
      text-align: center;
    }
    .loader span {
      display: inline-block;
      width: 12px; height: 12px;
      background: #007acc;
      border-radius: 50%;
      margin: 0 4px;
      animation: bounce 0.6s infinite alternate;
    }
    .loader span:nth-child(2){ animation-delay: 0.2s; }
    .loader span:nth-child(3){ animation-delay: 0.4s; }

    iframe {
      width: 100%;
      height: 400px;
      border: 0;
      border-radius: 12px;
      margin-top: 15px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: rgba(0,0,0,0.05);
      font-size: 0.9em;
      margin-top: 20px;
    }

    .score-bar {
      margin-top: 15px;
      background: #ddd;
      border-radius: 20px;
      overflow: hidden;
    }
    .score-fill {
      height: 20px;
      width: 0%;
      background: linear-gradient(90deg,#00c853,#b2ff59);
      text-align: center;
      color: white;
      font-size: 0.8em;
      transition: width 1s;
    }

    /* Animations */
    @keyframes fadeInUp { from {opacity:0; transform:translateY(40px);} to {opacity:1; transform:translateY(0);} }
    @keyframes fadeInDown { from {opacity:0; transform:translateY(-40px);} to {opacity:1; transform:translateY(0);} }
    @keyframes bounce { to { transform: translateY(-8px);} }
  </style>
</head>
<body>  
  <header>  
    <h1>🌍 Virtual Health Assistant</h1>  
    <p>AI-powered guidance for refugees and displaced communities</p>  
  </header>    

  <main>  
    <section class="symptom-checker">  
      <h2>📝 Enter Your Symptoms</h2>  
      <form id="symptomForm">  
        <textarea id="symptoms" rows="5" placeholder="E.g., fever, cough, chest pain..."></textarea><br>  
        <button type="submit">Analyze</button>  
        <button type="button" id="voiceBtn">🎤 Speak</button>
      </form>  
      <div class="loader" id="loader"><span></span><span></span><span></span></div>
      <div id="aiResponse"></div>  
      <div class="doctor-image" id="doctorImage"></div>
      <div class="score-bar"><div class="score-fill" id="scoreFill">0%</div></div>
    </section>  

    <section class="nearby-services">  
      <h2>🏥 Nearby Doctors & Hospitals</h2>  
      <iframe id="mapFrame" 
        src="https://www.google.com/maps?q=hospitals+near+me&output=embed" 
        allowfullscreen loading="lazy"></iframe>
    </section>
  </main>    

  <footer>  
    <p>⚕️ Supporting SDG 3 (Good Health), SDG 10 (Reduced Inequalities), SDG 16 (Peace & Justice)</p>  
  </footer>    

  <script>
    const form = document.getElementById('symptomForm');
    const responseBox = document.getElementById('aiResponse');
    const loader = document.getElementById('loader');
    const scoreFill = document.getElementById('scoreFill');
    const mapFrame = document.getElementById('mapFrame');
    const doctorImage = document.getElementById('doctorImage');

    const doctorImages = {
      "General Physician": "https://cdn-icons-png.flaticon.com/512/387/387561.png",
      "Cardiologist / Pulmonologist": "https://cdn-icons-png.flaticon.com/512/2966/2966327.png",
      "Gastroenterologist": "https://cdn-icons-png.flaticon.com/512/4320/4320348.png"
    };

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      responseBox.innerHTML = "";
      doctorImage.innerHTML = "";
      loader.style.display = "block";

      const symptoms = document.getElementById('symptoms').value.toLowerCase().trim();
      if (!symptoms) {
        loader.style.display = "none";
        responseBox.innerHTML = "<strong>Please enter your symptoms.</strong>";
        return;
      }

      setTimeout(() => {
        loader.style.display = "none";
        let advice = "";
        let doctor = "";
        let mapQuery = "hospitals near me";
        let score = 50;

        if (symptoms.includes("fever") || symptoms.includes("cough")) {
          advice = "You might have a viral infection. Rest, hydrate, and monitor your temperature.";
          doctor = "General Physician";
          mapQuery = "general physician near me";
          score = 60;
        } 
        else if (symptoms.includes("chest pain") || symptoms.includes("breath")) {
          advice = "Seek urgent care! Symptoms may indicate heart/lung condition.";
          doctor = "Cardiologist / Pulmonologist";
          mapQuery = "cardiologist near me";
          score = 30;
        } 
        else if (symptoms.includes("vomit") || symptoms.includes("diarrhea")) {
          advice = "It looks stomach-related. Stay hydrated & eat light.";
          doctor = "Gastroenterologist";
          mapQuery = "gastroenterologist near me";
          score = 70;
        } else {
          advice = "Not clearly matched. Please consult a doctor.";
          doctor = "General Physician";
          mapQuery = "clinics near me";
          score = 50;
        }

        responseBox.innerHTML = `💡 <strong>Suggestions:</strong> ${advice}\n\n👨‍⚕️ <strong>Suggested Doctor:</strong> ${doctor}`;
        scoreFill.style.width = score + "%";
        scoreFill.textContent = score + "%";
        mapFrame.src = `https://www.google.com/maps?q=${encodeURIComponent(mapQuery)}&output=embed`;

        // Show doctor image
        if (doctorImages[doctor]) {
          doctorImage.innerHTML = `<img src="${doctorImages[doctor]}" alt="${doctor}">`;
        }
      }, 1500);
    });

    // 🎤 Voice input
    document.getElementById("voiceBtn").addEventListener("click", () => {
      try {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-US";
        recognition.start();
        recognition.onresult = (event) => {
          document.getElementById("symptoms").value = event.results[0][0].transcript;
          form.dispatchEvent(new Event("submit")); // auto-analyze after speaking
        };
      } catch (err) {
        alert("Voice input not supported in this browser.");
      }
    });
  </script>
</body>  
</html>
